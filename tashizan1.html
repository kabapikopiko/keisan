<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たしざんゲーム</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #eef9ff; /* やさしいみずいろ */
        }
        #game-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 30px; /* まるっこく */
            border: 6px solid #ffeb3b; /* きいろいわく */
            box-shadow: 0 8px 0 #dedede;
            width: 340px;
        }
        #score-board {
            font-size: 20px;
            font-weight: bold;
            color: #ff5722;
            background: #fff3e0;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        #question {
            font-size: 56px;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
            letter-spacing: 2px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 32px;
            width: 140px;
            text-align: center;
            border: 4px solid #b3e5fc;
            border-radius: 15px;
            outline: none;
            background-color: #f9f9f9;
        }
        input[type="number"]:focus {
            border-color: #03a9f4;
            background-color: #fff;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4caf50; /* みどりいろ */
            color: white;
            border: none;
            border-radius: 50px;
            border-bottom: 5px solid #388e3c;
            width: 100%;
            transition: 0.1s;
        }
        button:active {
            margin-top: 23px;
            border-bottom: 2px solid #388e3c;
        }
        #feedback {
            font-size: 26px;
            font-weight: bold;
            height: 80px; /* はなまる用に少し広げました */
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .correct { color: #ff1744; } /* あかいはなまる */
        .incorrect { color: #2196f3; }
        .hanamaru {
            font-size: 40px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">💮 せいかい: <span id="score">0</span> もん</div>
    <div id="question">? + ? =</div>
    
    <input type="number" id="user-answer" placeholder="？" pattern="\d*" inputmode="numeric" onkeydown="if(event.key==='Enter') checkAnswer()">
    <button onclick="checkAnswer()" id="action-btn">こたえる</button>
    
    <div id="feedback"></div>
</div>

<script>
    let num1 = 0;
    let num2 = 0;
    let correctAnswer = 0;
    let score = 0;
    let isAnswered = false;

    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('user-answer');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const btn = document.getElementById('action-btn');

    // つぎのもんだい
    function makeQuestion() {
        num1 = Math.floor(Math.random() * 9) + 1;
        num2 = Math.floor(Math.random() * 9) + 1;
        correctAnswer = num1 + num2;

        questionEl.innerText = `${num1} ＋ ${num2} ＝`;
        answerInput.value = '';
        feedbackEl.innerHTML = '';
        answerInput.disabled = false;
        answerInput.focus();
        
        btn.style.backgroundColor = '#4caf50';
        btn.style.borderBottom = '5px solid #388e3c';
        btn.innerText = 'こたえる';
        isAnswered = false;
    }

    // こたえあわせ
    function checkAnswer() {
        if (isAnswered) {
            makeQuestion();
            return;
        }

        const userAnswer = parseInt(answerInput.value);

        if (isNaN(userAnswer)) {
            feedbackEl.innerHTML = "すうじを いれてね";
            feedbackEl.className = "incorrect";
            return;
        }

        if (userAnswer === correctAnswer) {
            feedbackEl.innerHTML = `<div class="hanamaru">💮</div><span class="correct">せいかい！ すごい！</span>`;
            score++;
            scoreEl.innerText = score;
        } else {
            feedbackEl.innerHTML = `<span class="incorrect">ざんねん！<br>せいかいは 【${correctAnswer}】 だよ</span>`;
        }

        answerInput.disabled = true;
        
        // ボタンをつぎへ進むデザインに変える
        btn.style.backgroundColor = '#ff9800'; // オレンジいろ
        btn.style.borderBottom = '5px solid #e65100';
        btn.innerText = 'つぎのもんだいへ';
        btn.focus();
        isAnswered = true;
    }

    // スタート
    makeQuestion();
</script>

</body>
</html>
