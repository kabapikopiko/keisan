<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>みつけよう！光の星座（タッチ完全安定版）</title>
    <style>
        /* 🛠️ iPhoneの画面の引っ張りバグ（バウンススクロール）をシステムごと完全に禁止 */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; position: fixed;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* スマホのお節介なズームやスクロールを一切させない */
        }
        body {
            background: linear-gradient(135deg, #020617 0%, #0f052d 100%);
            color: #f8fafc;
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .back-to-menu {
            position: absolute; top: 15px; left: 15px; background-color: #ffffff; color: #020617;
            border: 2px solid #38bdf8; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: bold;
            text-decoration: none; box-shadow: 0 4px 0 #38bdf8; z-index: 200;
            transition: opacity 0.2s ease; touch-action: manipulation;
        }
        .back-to-menu:active { transform: translateY(2px); box-shadow: 0 2px 0 #38bdf8; }
        
        #header-area { text-align: center; margin-bottom: 5px; z-index: 10; margin-top: 20px; }
        #title { font-size: 14px; font-weight: bold; letter-spacing: 4px; color: #94a3b8; margin: 0 0 3px 0; }
        #score-board { font-size: 24px; color: #38bdf8; font-weight: bold; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        #title-rank { font-size: 12px; color: #64748b; margin-top: 2px; }

        #status-area { text-align: center; margin-bottom: 8px; z-index: 10; }
        #level { font-size: 20px; font-weight: bold; color: #fff; }
        #message { font-size: 13px; color: #94a3b8; min-height: 18px; margin-top: 2px; padding: 0 10px; }

        #time-bar-container {
            width: 85vw; max-width: 340px; height: 6px; background: #0f172a; border-radius: 3px; margin-bottom: 15px; overflow: hidden; z-index: 10;
        }
        #time-bar { width: 100%; height: 100%; background-color: #38bdf8; transition: width 0.1s linear; box-shadow: 0 0 8px #38bdf8; }

        /* 難易度選択画面 */
        #level-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; gap: 12px; z-index: 20; width: 90vw; max-width: 340px;
        }
        #level-screen h2 { margin: 0 0 10px 0; color: #fff; font-size: 22px; letter-spacing: 2px; }
        .btn-level {
            width: 100%; padding: 14px 0; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 20px;
            cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.3); transition: 0.1s; touch-action: manipulation;
        }
        .btn-level:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn-easy { background-color: #10b981; border-bottom: 4px solid #047857; }
        .btn-medium { background-color: #3b82f6; border-bottom: 4px solid #1d4ed8; }
        .btn-hard { background-color: #8b5cf6; border-bottom: 4px solid #6d28d9; }
        .btn-expert { background-color: #ec4899; border-bottom: 4px solid #be185d; }

        #play-screen { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; }

        /* ゲーム盤面 */
        #game-outer { position: relative; width: 92vw; max-width: 360px; aspect-ratio: 1 / 1; z-index: 10; }
        #line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 11; }
        
        #game-board {
            display: grid; gap: 5px; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); padding: 10px; border-radius: 16px;
            border: 2px solid #1e293b; box-shadow: inset 0 4px 30px rgba(0,0,0,0.7);
        }

        /* ■の四角いパネル */
        .pad {
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 6px;
            width: 100%; height: 100%;
            position: relative;
            z-index: 12;
            transition: background-color 0.15s, box-shadow 0.15s;
        }

        .pad.start { background-color: #0284c7; box-shadow: inset 0 0 10px #38bdf8; }
        .pad.goal { background-color: #e11d48; box-shadow: inset 0 0 10px #fb7185; }
        
        .pad.start::after { content: 'START'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; color: #fff; font-weight: bold; }
        .pad.goal::after { content: 'GOAL'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; color: #fff; font-weight: bold; }

        .pad.trap { background-color: #b45309; box-shadow: inset 0 0 8px #f59e0b; }
        .pad.trap::after { content: '⚠️'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; }

        .pad.hint { background-color: #eab308; box-shadow: 0 0 12px #fde047; }
        .pad.active { background-color: #10b981; box-shadow: 0 0 15px #34d399; }

        /* 🛠️ ボタンの誤作動を防ぐため、透明な壁ではなく、必要のない時は「非表示（display:none）」にする完璧な設計に変更 */
        #retry-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(2, 6, 23, 0.9); border-radius: 16px;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 150;
        }
        #retry-overlay.active { display: flex; } /* ゲームオーバー時だけ出現 */
        #retry-title { font-size: 18px; font-weight: bold; margin-bottom: 25px; color: #f43f5e; text-align: center; line-height: 1.5; padding: 0 20px; }
        
        .action-btn {
            padding: 16px 50px; font-size: 18px; font-weight: bold;
            background-color: #38bdf8; color: #020617; border: none; border-radius: 50px;
            box-shadow: 0 5px 0 #0284c7; cursor: pointer; transition: 0.05s;
            position: relative; z-index: 160;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0284c7; }
    </style>
</head>
<body>

    <a href="index.html" id="back-btn" class="back-to-menu">🏠 メニュー</a>

    <div id="header-area">
        <div id="title">MELODY PANEL LINE</div>
        <div id="score-board">SCORE: 00000</div>
        <div id="title-rank">称号: 新米の指揮者</div>
    </div>

    <div id="level-screen">
        <h2>どのメロディに挑戦する？</h2>
        <button class="btn-level btn-easy" onclick="selectDifficulty('easy')">🟢 しょきゅう (4x4・5音)</button>
        <button class="btn-level btn-medium" onclick="selectDifficulty('medium')">🟡 ちゅうきゅう (6x6・8音)</button>
        <button class="btn-level btn-hard" onclick="selectDifficulty('hard')">🔴 じょうきゅう (8x8・12音)</button>
        <button class="btn-level btn-expert" onclick="selectDifficulty('expert')">🔥 ちょうじょうきゅう (8x8・超ロング大作)</button>
    </div>

    <div id="play-screen">
        <div id="status-area">
            <div id="level">MELODY 1</div>
            <div id="message">おぼえてね...</div>
        </div>

        <div id="time-bar-container">
            <div id="time-bar"></div>
        </div>

        <div id="game-outer">
            <div id="retry-overlay">
                <div id="retry-title">タイムアップ！</div>
                <button id="start-btn" class="action-btn">もういちど見る</button>
            </div>

            <svg id="line-svg">
                <path id="guide-path" d="" fill="none" stroke="rgba(254, 240, 138, 0.5)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,5"/>
                <path id="player-path-line" d="" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0px 0px 6px #34d399);"/>
            </svg>
            <div id="game-board"></div>
        </div>
    </div>

    <script>
        let currentRoute = [];    
        let playerPath = [];     
        let trapPads = [];       
        let level = 1;
        let score = 0;
        let isGameActive = false;
        let isDrawing = false;   
        let timeLimit = 100;     
        let timeInterval = null;
        
        let gridSize = 6; 
        let totalPads = 36;
        let currentDifficulty = 'medium';

        const backBtn = document.getElementById('back-btn');
        const levelScreen = document.getElementById('level-screen');
        const playScreen = document.getElementById('play-screen');
        const startBtn = document.getElementById('start-btn');
        const retryOverlay = document.getElementById('retry-overlay');
        const retryTitle = document.getElementById('retry-title');
        const levelDisplay = document.getElementById('level');
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score-board');
        const rankDisplay = document.getElementById('title-rank');
        const timeBar = document.getElementById('time-bar');
        const board = document.getElementById('game-board');
        const guidePath = document.getElementById('guide-path');
        const playerLine = document.getElementById('player-path-line');
        let pads = [];
        let padPositions = []; 

        const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00, A4=440.00, B4=493.88, C5=523.25, D5=587.33, E5=659.25, F5=698.46;
        const songMelodies = {
            easy:   [E4, D4, C4, D4, E4, E4, E4], 
            medium: [C4, D4, E4, F4, E4, D4, C4, E4], 
            hard:   [C4, C4, G4, G4, A4, A4, G4, F4, F4, E4, E4, D4], 
            expert: [G4, C5, C5, C5, B4, C5, D5, B4, G4, A4, B4, C5, C5, C5, E5, D5, C5, D5, E5, C5, D5, E5, F5] 
        };

        function selectDifficulty(diff) {
            currentDifficulty = diff;
            if (diff === 'easy')   { gridSize = 4; }
            if (diff === 'medium') { gridSize = 6; }
            if (diff === 'hard')   { gridSize = 8; }
            if (diff === 'expert') { gridSize = 8; } 
            totalPads = gridSize * gridSize;

            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            levelScreen.style.display = 'none';
            playScreen.style.display = 'flex';
            
            level = 1; score = 0;
            scoreDisplay.innerText = "SCORE: 00000";
            
            createBoard();
            nextLevel();
        }

        function createBoard() {
            board.innerHTML = '';
            pads = [];
            for (let i = 0; i < totalPads; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.id = `pad-${i}`;
                board.appendChild(pad);
                pads.push(pad);
            }
        }

        function cachePadPositions() {
            const boardRect = document.getElementById('game-outer').getBoundingClientRect();
            padPositions = pads.map(pad => {
                const rect = pad.getBoundingClientRect();
                return {
                    x: (rect.left + rect.width / 2) - boardRect.left,
                    y: (rect.top + rect.height / 2) - boardRect.top
                };
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playMelodyTone(stepIndex) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            const currentSong = songMelodies[currentDifficulty];
            const freq = currentSong[stepIndex % currentSong.length];

            osc.frequency.value = freq; osc.type = 'sine';
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function getPadCenter(index) {
            return padPositions[index];
        }

        function drawSvgLine(pathEl, pointsArray) {
            if (pointsArray.length === 0) { pathEl.setAttribute('d', ''); return; }
            let dString = "";
            pointsArray.forEach((padIdx, i) => {
                const pt = getPadCenter(padIdx);
                dString += (i === 0) ? `M ${pt.x} ${pt.y}` : ` L ${pt.x} ${pt.y}`;
            });
            pathEl.setAttribute('d', dString);
        }

        function updateRank() {
            let rank = "みならい指揮者";
            if (level >= 3)  rank = "天才アレンジャー";
            if (level >= 6)  rank = "絶対音感マスター";
            if (level >= 9)  rank = "ネオンマエストロ";
            rankDisplay.innerText = `称号: ${rank}`;
        }

        function getAdjacentPads(index) {
            const adj = [];
            const x = index % gridSize;
            const y = Math.floor(index / gridSize);
            if (x > 0) adj.push(index - 1);                     
            if (x < gridSize - 1) adj.push(index + 1); 
            if (y > 0) adj.push(index - gridSize);     
            if (y < gridSize - 1) adj.push(index + gridSize); 
            return adj;
        }

        function generateRoute(length) {
            const route = [];
            let current = Math.floor(Math.random() * totalPads);
            while(trapPads.includes(current)) { current = Math.floor(Math.random() * totalPads); }
            route.push(current);

            for (let i = 1; i < length; i++) {
                const possible = getAdjacentPads(current).filter(p => !route.includes(p) && !trapPads.includes(p));
                if (possible.length === 0) break;
                const next = possible[Math.floor(Math.random() * possible.length)];
                route.push(next);
                current = next;
            }
            return route;
        }

        function generateTraps() {
            trapPads = [];
            if (level < 3) return;
            let maxTraps = 2;
            if (currentDifficulty === 'hard') maxTraps = 4;
            if (currentDifficulty === 'expert') maxTraps = 5;
            
            const trapCount = Math.min(1 + Math.floor((level - 3) / 2), maxTraps);
            while(trapPads.length < trapCount) {
                let t = Math.floor(Math.random() * totalPads);
                if (!trapPads.includes(t)) { trapPads.push(t); }
            }
        }

        function startTimer() {
            clearInterval(timeInterval);
            timeLimit = 100;
            timeBar.style.width = '100%';
            timeBar.style.backgroundColor = '#38bdf8';
            
            let baseTime = 10000;
            if (currentDifficulty === 'hard') baseTime = 16000;
            if (currentDifficulty === 'expert') baseTime = 25000; 

            const duration = Math.max(baseTime - (level * 400), 6000); 
            const intervalStep = 100; 
            const decreasePerStep = (intervalStep / duration) * 100;

            timeInterval = setInterval(() => {
                timeLimit -= decreasePerStep;
                if (timeLimit <= 0) {
                    timeLimit = 0; timeBar.style.width = '0%';
                    gameOver("じかんぎれ！<br>もういちど ルートを おぼえよう");
                } else {
                    timeBar.style.width = `${timeLimit}%`;
                    if (timeLimit < 30) { timeBar.style.backgroundColor = '#f43f5e'; }
                }
            }, intervalStep);
        }

        async function playHint() {
            isGameActive = false;
            retryOverlay.classList.remove('active'); // リトライ画面を完全に非表示
            messageDisplay.innerText = "ひかる パネルの メロディを おぼえてね...";
            clearInterval(timeInterval);
            timeBar.style.width = '100%';
            if (backBtn) backBtn.classList.add('hidden');

            pads.forEach(p => p.className = 'pad');
            drawSvgLine(playerLine, []);
            drawSvgLine(guidePath, []);

            setTimeout(() => { cachePadPositions(); }, 50);

            trapPads.forEach(t => pads[t].classList.add('trap'));
            pads[currentRoute[0]].classList.add('start');
            pads[currentRoute[currentRoute.length - 1]].classList.add('goal');

            let currentHintRoute = [];
            let speed = (currentRoute.length > 8) ? 170 : 260;

            for (let i = 0; i < currentRoute.length; i++) {
                await new Promise(r => setTimeout(r, speed));
                pads[currentRoute[i]].classList.add('hint');
                currentHintRoute.push(currentRoute[i]);
                drawSvgLine(guidePath, currentHintRoute); 
                playMelodyTone(i); 
            }

            await new Promise(r => setTimeout(r, 800));
            pads.forEach(p => p.classList.remove('hint')); 
            guidePath.setAttribute('d', ''); 
            
            isGameActive = true;
            messageDisplay.innerText = "START パネル から メロディを なぞろう！";
            if (backBtn) backBtn.classList.remove('hidden');
            startTimer();
        }

        function nextLevel() {
            let modeName = "しょきゅう";
            if (currentDifficulty === 'medium') modeName = "ちゅうきゅう";
            if (currentDifficulty === 'hard') modeName = "じょうきゅう";
            if (currentDifficulty === 'expert') modeName = "ちょうじょうきゅう";

            levelDisplay.innerText = `${modeName} - STAGE ${level}`;
            updateRank();
            generateTraps(); 

            let minLen = 5, maxLen = 7; 
            if (currentDifficulty === 'medium') { minLen = 7; maxLen = 10; }
            if (currentDifficulty === 'hard')   { minLen = 10; maxLen = 15; }
            if (currentDifficulty === 'expert') { minLen = 15; maxLen = 25; } 

            const routeLength = Math.min(minLen + Math.floor(level / 1.5), maxLen);
            currentRoute = generateRoute(routeLength);
            if (currentRoute.length < 3) return nextLevel(); 
            playHint();
        }

        function gameOver(msg) {
            isGameActive = false; isDrawing = false;
            clearInterval(timeInterval);
            messageDisplay.innerHTML = msg;
            
            retryTitle.innerHTML = msg;
            retryOverlay.classList.add('active'); // オーバーレイを表示
            
            pads.forEach(p => p.classList.remove('active'));
            drawSvgLine(playerLine, []);
        }

        function getPadIndexFromCoords(clientX, clientY) {
            const element = document.elementFromPoint(clientX, clientY);
            if (!element || !element.classList.contains('pad')) return null;
            return pads.indexOf(element);
        }

        function drawStart(index) {
            if (!isGameActive || index === null) return;
            if (trapPads.includes(index)) { gameOver("⚠️ トラップに ふんじゃった！"); return; }
            if (index !== currentRoute[0]) return;
            
            isDrawing = true;
            playerPath = [index];
            pads[index].classList.add('active');
            drawSvgLine(playerLine, playerPath);
            playMelodyTone(0); 
        }

        function drawMove(index) {
            if (!isDrawing || index === null) return;
            if (trapPads.includes(index)) { gameOver("⚠️ トラップに ふんじゃった！"); return; }

            const lastIndex = playerPath[playerPath.length - 1];
            if (index === lastIndex) return;

            if (getAdjacentPads(lastIndex).includes(index)) {
                if (playerPath.length > 1 && index === playerPath[playerPath.length - 2]) {
                    pads[lastIndex].classList.remove('active');
                    playerPath.pop();
                    drawSvgLine(playerLine, playerPath);
                    playMelodyTone(playerPath.length - 1);
                    return;
                }
                if (!playerPath.includes(index)) {
                    playerPath.push(index);
                    pads[index].classList.add('active');
                    drawSvgLine(playerLine, playerPath); 
                    playMelodyTone(playerPath.length - 1); 
                }
            }
        }

        function drawEnd() {
            if (!isDrawing) return;
            isDrawing = false;
            clearInterval(timeInterval);

            const isCorrect = playerPath.length === currentRoute.length &&
                              playerPath.every((val, index) => val === currentRoute[index]);

            if (isCorrect) {
                isGameActive = false;
                let baseScore = 100;
                if(currentDifficulty === 'hard') baseScore = 150;
                if(currentDifficulty === 'expert') baseScore = 250;

                const bonus = Math.floor(timeLimit * 10);
                score += baseScore + bonus;
                scoreDisplay.innerText = `SCORE: ${String(score).padStart(5, '0')}`;
                messageDisplay.innerText = `素晴らしい演奏です！つぎのステージへ！`;
                level++;
                setTimeout(nextLevel, 1200);
            } else {
                gameOver("メロディの ルートが ちがうみたい！");
            }
        }

        const outerArea = document.getElementById('game-outer');

        // 🛠️ 【修正】iPhoneで指が外にはみ出しても電波を絶対に離さない最強のイベントリスナー構造に進化
        outerArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const idx = getPadIndexFromCoords(t.clientX, t.clientY);
            drawStart(idx);
        }, { passive: false });

        outerArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const idx = getPadIndexFromCoords(t.clientX, t.clientY);
            // 指が枠外に出て何も取得できないとき（null）でも途切れないようにガード
            if(idx !== null) { drawMove(idx); }
        }, { passive: false });

        outerArea.addEventListener('touchend', (e) => {
            e.preventDefault(); drawEnd();
        }, false);

        // 🛠️ iPhoneが勝手にタッチを無効化する最悪のバグ（touchcancel）が起きたら即座にやり直しとして受け付ける
        outerArea.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            drawEnd();
        }, false);

        // マウス用（PC環境）
        outerArea.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const idx = getPadIndexFromCoords(e.clientX, e.clientY);
            drawStart(idx);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const idx = getPadIndexFromCoords(e.clientX, e.clientY);
            if(idx !== null) { drawMove(idx); }
        });

        window.addEventListener('mouseup', () => { drawEnd(); });

        startBtn.addEventListener('click', () => { playHint(); });
    </script>
</body>
</html>
