<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たしざんゲーム</title>
    <style>
        /* 画面全体が絶対にスクロール・スライドしないように固定 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed; /* iPhoneのスクロールを完全に禁止 */
            background: linear-gradient(135deg, #eef9ff 0%, #d2f0ff 100%);
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
        }

        /* 左上のメニューに戻るボタン */
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #ffffff;
            color: #7f8c8d;
            border: 3px solid #bdc3c7;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 0 #bdc3c7;
            z-index: 10;
        }
        .back-to-menu:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #bdc3c7;
        }

        /* 画面全体の配置調整（iPhoneのキーボードが上がっても被らない上部配置） */
        .wrapper {
            position: absolute;
            top: 8%; /* 画面の少し上側に配置することでキーボードとの衝突を防ぐ */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            text-align: center;
            background: white;
            padding: 25px 20px;
            border-radius: 30px; 
            border: 6px solid #ffeb3b; 
            box-shadow: 0 10px 0 #e0d025, 0 15px 30px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        #score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ff5722;
            background: #fff3e0;
            padding: 5px 18px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

        #question {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
            letter-spacing: 2px;
        }

        /* 入力欄：iPhoneの自動ズームを防ぐためフォントサイズを調整 */
        input[type="number"] {
            padding: 10px;
            font-size: 32px; /* 見た目は大きく */
            width: 140px;
            text-align: center;
            border: 4px solid #b3e5fc;
            border-radius: 20px;
            outline: none;
            background-color: #fcfcfc;
            /* iPhoneの「16px未満だと勝手にズームする」仕様を回避するための設定 */
            font-size: 24px; 
        }

        input[type="number"]:focus {
            border-color: #03a9f4;
            background-color: #fff;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4caf50; 
            color: white;
            border: none;
            border-radius: 50px;
            border-bottom: 6px solid #2e7d32;
            width: 100%;
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
        }

        button:active {
            transform: translateY(4px);
            border-bottom: 2px solid #2e7d32;
        }

        #feedback {
            font-size: 22px;
            font-weight: bold;
            height: 80px; 
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .correct { color: #ff1744; animation: pop 0.3s ease-out; }
        .incorrect { color: #2196f3; animation: shake 0.3s ease-in-out; }
        
        .hanamaru {
            font-size: 40px;
            animation: spinPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes spinPop { 0% { transform: scale(0) rotate(-45deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 999;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-to-menu" onclick="playSound('click')">🏠 もどる</a>

<div class="wrapper">
    <div id="game-container">
        <div id="score-board">💮 せいかい: <span id="score">0</span> もん</div>
        <div id="question">? + ? =</div>
        
        <input type="number" id="user-answer" placeholder="？" pattern="\d*" inputmode="numeric" onkeydown="if(event.key==='Enter') checkAnswer()">
        <button onclick="checkAnswer()" id="action-btn">こたえる</button>
        
        <div id="feedback"></div>
    </div>
</div>

<script>
    let num1 = 0;
    let num2 = 0;
    let correctAnswer = 0;
    let score = 0;
    let isAnswered = false;

    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('user-answer');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const btn = document.getElementById('action-btn');

    // 🔊 効果音システム
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
            gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'incorrect') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(130, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    // ✨ キラキラ
    function createParticles() {
        const colors = ['#ff1744', '#ffea00', '#00e676', '#00b0ff', '#d500f9'];
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 10 + 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = '50%';
            particle.style.top = '30%'; // ラッパーの位置に合わせて少し上に
            document.body.appendChild(particle);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 120 + 80;
            const destinationX = Math.cos(angle) * velocity;
            const destinationY = Math.sin(angle) * velocity - 30;
            
            const animation = particle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(calc(-50% + ${destinationX}px), calc(-50% + ${destinationY}px)) scale(0)`, opacity: 0 }
            ], { duration: Math.random() * 500 + 500, easing: 'cubic-bezier(0.1, 0.8, 0.25, 1)', fill: 'forwards' });
            animation.onfinish = () => particle.remove();
        }
    }

    function makeQuestion() {
        num1 = Math.floor(Math.random() * 9) + 1;
        num2 = Math.floor(Math.random() * 9) + 1;
        correctAnswer = num1 + num2;

        questionEl.innerText = `${num1} ＋ ${num2} ＝`;
        answerInput.value = '';
        feedbackEl.innerHTML = '';
        answerInput.disabled = false;
        
        btn.style.backgroundColor = '#4caf50';
        btn.style.borderBottom = '6px solid #2e7d32';
        btn.innerText = 'こたえる';
        isAnswered = false;
    }

    function checkAnswer() {
        if (isAnswered) {
            playSound('click');
            makeQuestion();
            return;
        }

        const userAnswer = parseInt(answerInput.value);

        if (isNaN(userAnswer)) {
            playSound('incorrect');
            feedbackEl.innerHTML = `<span class="incorrect">すうじを いれてね</span>`;
            return;
        }

        if (userAnswer === correctAnswer) {
            playSound('correct');
            createParticles();
            feedbackEl.innerHTML = `<div class="hanamaru">💮</div><span class="correct">せいかい！ すごい！</span>`;
            score++;
            scoreEl.innerText = score;
        } else {
            playSound('incorrect');
            feedbackEl.innerHTML = `<span class="incorrect">ざんねん！<br>せいかいは 【${correctAnswer}】 だよ</span>`;
        }

        answerInput.disabled = true;
        btn.style.backgroundColor = '#ff9800'; 
        btn.style.borderBottom = '6px solid #e65100';
        btn.innerText = 'つぎのもんだいへ';
        btn.focus();
        isAnswered = true;
    }

    makeQuestion();
</script>

</body>
</html>
