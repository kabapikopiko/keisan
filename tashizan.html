<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たしざんゲーム</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #eef9ff 0%, #d2f0ff 100%); /* グラデーションで綺麗に */
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 左上のメニューに戻るボタン */
        .back-to-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ffffff;
            color: #7f8c8d;
            border: 3px solid #bdc3c7;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 0 #bdc3c7;
            transition: 0.1s;
        }
        .back-to-menu:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #bdc3c7;
        }

        #game-container {
            text-align: center;
            background: white;
            padding: 30px 25px;
            border-radius: 30px; 
            border: 6px solid #ffeb3b; 
            box-shadow: 0 10px 0 #e0d025, 0 15px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 340px;
            box-sizing: border-box;
            z-index: 2;
        }

        #score-board {
            font-size: 20px;
            font-weight: bold;
            color: #ff5722;
            background: #fff3e0;
            padding: 6px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        #question {
            font-size: 52px;
            font-weight: bold;
            margin: 15px 0;
            color: #333;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #f0f0f0;
        }

        input[type="number"] {
            padding: 12px;
            font-size: 36px;
            width: 160px;
            text-align: center;
            border: 4px solid #b3e5fc;
            border-radius: 20px;
            outline: none;
            background-color: #fcfcfc;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: #03a9f4;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(3, 169, 244, 0.2);
        }

        button {
            margin-top: 25px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4caf50; 
            color: white;
            border: none;
            border-radius: 50px;
            border-bottom: 6px solid #2e7d32;
            width: 100%;
            transition: transform 0.1s;
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
        }

        button:active {
            transform: translateY(4px);
            border-bottom: 2px solid #2e7d32;
        }

        #feedback {
            font-size: 24px;
            font-weight: bold;
            height: 90px; 
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1.4;
        }

        .correct { color: #ff1744; animation: pop 0.3s ease-out; }
        .incorrect { color: #2196f3; animation: shake 0.3s ease-in-out; }
        
        .hanamaru {
            font-size: 45px;
            margin-bottom: 2px;
            animation: spinPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 演出用アニメーション */
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        @keyframes spinPop {
            0% { transform: scale(0) rotate(-45deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* キラキラエフェクトの粒スタイル */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 999;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-to-menu" onclick="playSound('click')">🏠 もどる</a>

<div id="game-container">
    <div id="score-board">💮 せいかい: <span id="score">0</span> もん</div>
    <div id="question">? + ? =</div>
    
    <input type="number" id="user-answer" placeholder="？" pattern="\d*" inputmode="numeric" onkeydown="if(event.key==='Enter') checkAnswer()">
    <button onclick="checkAnswer()" id="action-btn">こたえる</button>
    
    <div id="feedback"></div>
</div>

<script>
    let num1 = 0;
    let num2 = 0;
    let correctAnswer = 0;
    let score = 0;
    let isAnswered = false;

    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('user-answer');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const btn = document.getElementById('action-btn');

    // 🔊 ブラウザ合成音声（SE）システム
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'correct') {
            // ピコーン！という2音
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, now); // ド
            osc.frequency.setValueAtTime(659.25, now + 0.1, now + 0.1); // ミ
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'incorrect') {
            // ブブーという低い音
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(130, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    // ✨ キラキラエフェクトの生成
    function createParticles() {
        const colors = ['#ff1744', '#ffea00', '#00e676', '#00b0ff', '#d500f9'];
        const container = document.body;
        
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // ランダムな大きさと色
            const size = Math.random() * 12 + 6;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 画面中央付近からスタート
            particle.style.left = '50%';
            particle.style.top = '40%';
            
            container.appendChild(particle);
            
            // 四方八方に飛び散るアニメーション
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 150 + 100;
            const destinationX = Math.cos(angle) * velocity;
            const destinationY = Math.sin(angle) * velocity - 50; // 少し上に吹き飛ぶ
            
            const animation = particle.animate([
                { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(-50%, -50%) translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 600 + 600,
                easing: 'cubic-bezier(0.1, 0.8, 0.25, 1)',
                fill: 'forwards'
            });
            
            animation.onfinish = () => particle.remove();
        }
    }

    // つぎのもんだい
    function makeQuestion() {
        num1 = Math.floor(Math.random() * 9) + 1;
        num2 = Math.floor(Math.random() * 9) + 1;
        correctAnswer = num1 + num2;

        questionEl.innerText = `${num1} ＋ ${num2} ＝`;
        answerInput.value = '';
        feedbackEl.innerHTML = '';
        answerInput.disabled = false;
        
        // モバイルで自動フォーカスするとキーボードが被って見にくくなるのを防ぐため、デスクトップのみフォーカス
        if (!('ontouchstart' in window)) {
            answerInput.focus();
        }
        
        btn.style.backgroundColor = '#4caf50';
        btn.style.borderBottom = '6px solid #2e7d32';
        btn.innerText = 'こたえる';
        isAnswered = false;
    }

    // こたえあわせ
    function checkAnswer() {
        if (isAnswered) {
            playSound('click');
            makeQuestion();
            return;
        }

        const userAnswer = parseInt(answerInput.value);

        if (isNaN(userAnswer)) {
            playSound('incorrect');
            feedbackEl.innerHTML = `<span class="incorrect">すうじを いれてね</span>`;
            return;
        }

        if (userAnswer === correctAnswer) {
            playSound('correct');
            createParticles(); // キラキラを出す
            feedbackEl.innerHTML = `<div class="hanamaru">💮</div><span class="correct">せいかい！ すごい！</span>`;
            score++;
            scoreEl.innerText = score;
        } else {
            playSound('incorrect');
            feedbackEl.innerHTML = `<span class="incorrect">ざんねん！<br>せいかいは 【${correctAnswer}】 だよ</span>`;
        }

        answerInput.disabled = true;
        
        btn.style.backgroundColor = '#ff9800'; 
        btn.style.borderBottom = '6px solid #e65100';
        btn.innerText = 'つぎのもんだいへ';
        btn.focus();
        isAnswered = true;
    }

    // スタート
    makeQuestion();
</script>

</body>
</html>
